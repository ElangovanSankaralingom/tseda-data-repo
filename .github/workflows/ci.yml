name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - run: npm run build
        env:
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-value-for-build
          NEXTAUTH_URL: http://localhost:3000
      - name: Tests with coverage
        run: npm run test:ci
        env:
          NODE_ENV: test
      - name: Security audit
        run: npm audit --audit-level=high || true

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t tseda:ci .
